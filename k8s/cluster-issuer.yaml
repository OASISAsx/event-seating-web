apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # URL ของ Let's Encrypt สำหรับ Production
    server: https://acme-v02.api.letsencrypt.org/directory
    # ใส่ Email ของคุณ (สำคัญมาก: เอาไว้รับการแจ้งเตือนถ้าใบเซอร์ใกล้หมดอายุ)
    email: wave001133@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
